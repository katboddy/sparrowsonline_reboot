<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}Kat Lauzé — software engineer, distributed systems nerd.{% endblock %}" />
  <title>{% block title %}katlauze{% endblock %}</title>

  <!-- Theme — swap this one line to change the whole site's look -->
  <link rel="stylesheet" href="/static/css/themes/terminal.css" />
  <!-- Layout (references theme variables only, no hardcoded colours) -->
  <link rel="stylesheet" href="/static/css/main.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────── -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo">katlauze</a>
      <ul class="nav-links">
        <li><a href="/"       {% if request.url.path == '/'        %}class="active"{% endif %}>home</a></li>
        <li><a href="/about"  {% if request.url.path == '/about'   %}class="active"{% endif %}>about</a></li>
        <li><a href="/blog"   {% if request.url.path == '/blog'    %}class="active"{% endif %}>blog</a></li>
        <li><a href="/contact"{% if request.url.path == '/contact' %}class="active"{% endif %}>contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page content ────────────────────────────────────── -->
  <main id="main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="site-footer" aria-label="Site footer">
    <div class="footer-inner">
      <p class="footer-copy">
        <span class="text-accent">&#47;&#47;</span> katlauze &mdash; built with FastAPI &amp; markdown
      </p>
      <ul class="footer-links" aria-label="Social links">
        <li><a href="https://github.com/katboddy"                   target="_blank" rel="noopener">github</a></li>
        <li><a href="https://www.linkedin.com/in/kat-lauze-sparrowsonline" target="_blank" rel="noopener">linkedin</a></li>
        <li><a href="https://www.mobygames.com/person/1036914/katarzyna-boddy/" target="_blank" rel="noopener">mobygames (boddy)</a></li>
        <li><a href="https://www.mobygames.com/person/1904088/katarzyna-lauze/" target="_blank" rel="noopener">mobygames (lauzé)</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
