name: Deploy to AWS App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}                    # e.g. eu-west-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}            # e.g. katlauze-site
  APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -f Dockerfile.prod -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          aws apprunner update-service \
            --service-arn $APPRUNNER_SERVICE_ARN \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$IMAGE_URI\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {\"Port\": \"8000\"}
              }
            }"

          aws apprunner wait service-updated \
            --service-arn $APPRUNNER_SERVICE_ARN
