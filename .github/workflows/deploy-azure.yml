name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}                        # e.g. katlauzeacr
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}      # e.g. katlauze-rg
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}    # e.g. katlauze-site
  IMAGE_NAME: katlauze-site

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:${{ github.sha }} \
            --image $IMAGE_NAME:latest \
            --file Dockerfile.prod \
            .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
